<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #0a0a0f;
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      }
      canvas { display: block; }

      #root {
        width: 1080px;
        height: 1920px;
        position: relative;
        overflow: hidden;
      }

      /* particle layer */
      #particles {
        position: absolute;
        inset: 0;
        z-index: 1;
      }

      /* grid lines */
      .grid-line {
        position: absolute;
        background: linear-gradient(90deg, transparent, rgba(96,165,250,0.08), transparent);
        height: 1px;
        width: 100%;
      }
      .grid-line-v {
        position: absolute;
        background: linear-gradient(0deg, transparent, rgba(96,165,250,0.06), transparent);
        width: 1px;
        height: 100%;
      }

      /* glow orbs */
      .orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        z-index: 0;
      }

      /* main content */
      .scene {
        position: absolute;
        inset: 0;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 120px 80px;
      }

      .logo-ring {
        width: 200px;
        height: 200px;
        border-radius: 50%;
        border: 2px solid rgba(96,165,250,0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 60px;
        position: relative;
      }
      .logo-ring::before {
        content: "";
        position: absolute;
        inset: -12px;
        border-radius: 50%;
        border: 1px solid rgba(96,165,250,0.1);
      }
      .logo-icon {
        font-size: 72px;
        filter: drop-shadow(0 0 20px rgba(96,165,250,0.5));
      }

      .main-title {
        font-size: 68px;
        font-weight: 800;
        color: #fff;
        text-align: center;
        letter-spacing: 4px;
        line-height: 1.3;
        margin-bottom: 30px;
        text-shadow: 0 0 60px rgba(96,165,250,0.4);
      }
      .main-title .accent {
        color: #60a5fa;
        text-shadow: 0 0 80px rgba(96,165,250,0.6);
      }

      .subtitle {
        font-size: 32px;
        color: rgba(255,255,255,0.6);
        text-align: center;
        letter-spacing: 8px;
        margin-bottom: 50px;
      }

      .tag-row {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
        justify-content: center;
      }
      .tag {
        padding: 14px 36px;
        border: 1px solid rgba(96,165,250,0.25);
        border-radius: 40px;
        color: rgba(255,255,255,0.8);
        font-size: 26px;
        letter-spacing: 2px;
        background: rgba(96,165,250,0.06);
        backdrop-filter: blur(4px);
      }

      .stat-row {
        display: flex;
        gap: 80px;
        margin-top: 80px;
      }
      .stat {
        text-align: center;
      }
      .stat-num {
        font-size: 56px;
        font-weight: 800;
        color: #60a5fa;
        text-shadow: 0 0 40px rgba(96,165,250,0.4);
      }
      .stat-label {
        font-size: 22px;
        color: rgba(255,255,255,0.5);
        margin-top: 8px;
        letter-spacing: 2px;
      }

      /* data bars */
      .data-bars {
        position: absolute;
        bottom: 200px;
        left: 80px;
        right: 80px;
        display: flex;
        align-items: flex-end;
        gap: 12px;
        height: 120px;
      }
      .data-bar {
        flex: 1;
        border-radius: 4px 4px 0 0;
        background: linear-gradient(to top, #60a5fa, rgba(96,165,250,0.3));
      }
    </style>
  </head>
  <body>
    <div id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="15"
      data-width="1080"
      data-height="1920">

      <!-- bg orbs -->
      <div class="orb" style="width:500px;height:500px;background:rgba(96,165,250,0.12);top:-100px;right:-100px;"></div>
      <div class="orb" style="width:400px;height:400px;background:rgba(139,92,246,0.10);bottom:200px;left:-80px;"></div>

      <!-- grid -->
      <div class="grid-line" style="top:25%"></div>
      <div class="grid-line" style="top:50%"></div>
      <div class="grid-line" style="top:75%"></div>
      <div class="grid-line-v" style="left:20%"></div>
      <div class="grid-line-v" style="left:40%"></div>
      <div class="grid-line-v" style="left:60%"></div>
      <div class="grid-line-v" style="left:80%"></div>

      <!-- canvas for particles -->
      <canvas id="particles"></canvas>

      <!-- main scene -->
      <div class="scene">
        <div id="logo" class="logo-ring">
          <span class="logo-icon">⚡</span>
        </div>
        <div id="title" class="main-title">
          <span class="accent">蜂</span>职<span class="accent">速</span>聘
        </div>
        <div id="subtitle" class="subtitle">新媒体知识库</div>
        <div id="tags" class="tag-row">
          <span class="tag">内容生产流</span>
          <span class="tag">竞品情报</span>
          <span class="tag">数据驱动</span>
        </div>
        <div id="stats" class="stat-row">
          <div class="stat">
            <div class="stat-num">46+</div>
            <div class="stat-label">知识页面</div>
          </div>
          <div class="stat">
            <div class="stat-num">8</div>
            <div class="stat-label">内容模块</div>
          </div>
          <div class="stat">
            <div class="stat-num">3</div>
            <div class="stat-label">MOC 枢纽</div>
          </div>
        </div>
      </div>

      <!-- data bars -->
      <div id="bars" class="data-bars">
        <div class="data-bar" style="height:60%"></div>
        <div class="data-bar" style="height:90%"></div>
        <div class="data-bar" style="height:45%"></div>
        <div class="data-bar" style="height:75%"></div>
        <div class="data-bar" style="height:100%"></div>
        <div class="data-bar" style="height:55%"></div>
        <div class="data-bar" style="height:85%"></div>
        <div class="data-bar" style="height:40%"></div>
        <div class="data-bar" style="height:70%"></div>
        <div class="data-bar" style="height:95%"></div>
        <div class="data-bar" style="height:50%"></div>
        <div class="data-bar" style="height:80%"></div>
      </div>
    </div>

    <script>
      // particle system
      const canvas = document.getElementById("particles");
      const ctx = canvas.getContext("2d");
      canvas.width = 1080;
      canvas.height = 1920;

      const particles = [];
      const PARTICLE_COUNT = 80;
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        particles.push({
          x: (i * 137.5 + 50) % 1080,
          y: (i * 251 + 30) % 1920,
          r: 1 + (i % 3) * 0.8,
          speed: 0.3 + (i % 5) * 0.15,
          opacity: 0.3 + (i % 7) * 0.1,
          drift: (i % 3 - 1) * 0.4
        });
      }

      function drawParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (const p of particles) {
          p.y -= p.speed;
          p.x += p.drift;
          if (p.y < -10) { p.y = 1930; p.x = (p.x + 200) % 1080; }
          if (p.x < -10) p.x = 1090;
          if (p.x > 1090) p.x = -10;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(147,197,253,${p.opacity})`;
          ctx.fill();
        }
        // draw connections
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 160) {
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.strokeStyle = `rgba(96,165,250,${0.12 * (1 - dist / 160)})`;
              ctx.lineWidth = 0.5;
              ctx.stroke();
            }
          }
        }
        requestAnimationFrame(drawParticles);
      }
      drawParticles();

      // GSAP timeline
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Logo: scale + glow pulse
      tl.from("#logo", { scale: 0, opacity: 0, duration: 0.8, ease: "back.out(1.7)" }, 0);
      tl.to("#logo", { boxShadow: "0 0 100px rgba(96,165,250,0.6)", duration: 0.5, ease: "power1.inOut" }, 0.8);
      tl.to("#logo", { boxShadow: "0 0 30px rgba(96,165,250,0.2)", duration: 0.5, ease: "power1.inOut" }, 1.3);

      // Title: staggered chars
      tl.from("#title", { opacity: 0, y: 60, duration: 0.8, ease: "power3.out" }, 0.3);

      // Subtitle: fade up
      tl.from("#subtitle", { opacity: 0, y: 40, duration: 0.7, ease: "power3.out" }, 0.8);

      // Tags: stagger
      tl.from(".tag", {
        opacity: 0, y: 30, scale: 0.9,
        duration: 0.5,
        stagger: 0.12,
        ease: "back.out(1.4)"
      }, 1.2);

      // Stats: count up + fade in
      tl.from("#stats .stat", {
        opacity: 0, y: 50,
        duration: 0.6,
        stagger: 0.15,
        ease: "power3.out"
      }, 1.6);

      // Data bars: grow from bottom
      tl.from(".data-bar", {
        scaleY: 0,
        transformOrigin: "bottom center",
        duration: 0.8,
        stagger: 0.04,
        ease: "elastic.out(1, 0.6)"
      }, 2.0);

      // Grid lines: fade in
      tl.from(".grid-line, .grid-line-v", {
        opacity: 0,
        duration: 1.2,
        ease: "power2.out"
      }, 0);

      // Hold then exit sequence
      tl.to("#logo", { opacity: 0, scale: 1.2, duration: 0.6, ease: "power2.in" }, 13.5);
      tl.to("#title, #subtitle, .tag, .stat, .data-bar, .grid-line, .grid-line-v", {
        opacity: 0, y: -30,
        duration: 0.5,
        ease: "power2.in"
      }, 13.8);
      tl.to(canvas, { opacity: 0, duration: 0.5 }, 13.8);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
